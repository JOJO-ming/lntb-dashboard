<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px;-webkit-text-size-adjust:100%}
.header{background:linear-gradient(135deg,#1e3a5f,#2d5a87);color:#fff;padding:16px;text-align:center}
.header h1{font-size:20px;font-weight:700}
.header p{font-size:12px;opacity:.8;margin-top:2px}
.container{padding:12px;max-width:1300px;margin:0 auto}
.tabs{display:flex;gap:4px;margin-bottom:12px;background:#fff;border-radius:10px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tab{padding:8px 12px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:#666;background:transparent;transition:all .2s;flex:1;text-align:center}
.tab.active{background:#1e3a5f;color:#fff}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.kpi{background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kpi .l{font-size:12px;color:#888}
.kpi .v{font-size:22px;font-weight:700;color:#1e3a5f;margin:2px 0}
.kpi .s{font-size:11px;color:#aaa}
.kpi.ac .v{color:#c0392b}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:768px){.charts{grid-template-columns:1fr}}
.chart-box{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.chart-box h3{font-size:13px;color:#333;margin-bottom:6px;padding-bottom:6px;border-bottom:2px solid #e8ecf1}
.chart-box canvas{max-height:260px}
.toolbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;align-items:center}
.toolbar input,.toolbar select{padding:6px 10px;border:1px solid #d0d5dd;border-radius:6px;font-size:12px;font-family:inherit;outline:none;background:#fff}
.toolbar input{flex:1;min-width:140px}
.tb-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);-webkit-overflow-scrolling:touch}
.tb-scroll{overflow-x:auto;width:100%}
.tb-scroll table{width:max-content;min-width:100%;border-collapse:collapse;font-size:12px}
.tb-scroll th{background:#f7f9fb;color:#555;font-weight:600;padding:8px 10px;font-size:12px;text-align:left;white-space:nowrap;border-bottom:2px solid #e8ecf1;position:sticky;top:0;cursor:pointer;user-select:none}
.tb-scroll th:hover{background:#eef1f5}
.tb-scroll td{padding:7px 10px;font-size:12px;border-bottom:1px solid #f5f5f5;white-space:nowrap;cursor:pointer;transition:background .15s}
.tb-scroll td:last-child{max-width:300px;overflow:hidden;text-overflow:ellipsis}
.tb-scroll tr:hover td{background:#e8f0fe}
.tb-scroll tr:active td{background:#d0e3fc}
.pg{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;font-size:12px;color:#666}
.pg button{padding:4px 14px;border:1px solid #d0d5dd;background:#fff;border-radius:4px;cursor:pointer;font-size:12px}
.pg button:disabled{opacity:.4}
.badge{padding:2px 7px;border-radius:3px;font-size:12px;font-weight:600;display:inline-block;color:#333}
.footer{text-align:center;padding:16px;font-size:12px;color:#999}
.sort-ind{font-size:12px;margin-left:2px}
.hidden{display:none!important}
/* Detail modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;width:100%;max-width:600px;max-height:85vh;border-radius:16px 16px 0 0;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{padding:16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:16px;color:#1e3a5f;flex:1}
.modal-close{width:32px;height:32px;border:none;background:#f0f0f0;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-body{padding:16px}
.modal-body .item{margin-bottom:12px}
.modal-body .item .key{font-size:11px;color:#888;margin-bottom:3px}
.modal-body .item .val{font-size:14px;color:#1a1a2e;line-height:1.5}
.modal-body .item .link{color:#2d5a87;text-decoration:underline;word-break:break-all}
.modal-footer{padding:12px 16px;border-top:1px solid #eee;text-align:center}
.modal-footer a{display:inline-block;padding:10px 24px;background:#1e3a5f;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600}
</style>
</head>

<div class="header">

</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('tenders')">📋 招标公告</button>

    <button class="tab" onclick="switchTab('stats')">📊 业态统计</button>
  </div>

  <div class="kpi-row" id="kpi"></div>

  <div id="view-charts">
    <div class="charts">
      <div class="chart-box"><h3>📅 月度趋势</h3><canvas id="chMonthly"></canvas></div>
      <div class="chart-box"><h3>🏗️ 业态分布</h3><canvas id="chSector"></canvas></div>
      <div class="chart-box"><h3>🏷️ 公告类型 TOP15</h3><canvas id="chType"></canvas></div>
      <div class="chart-box"><h3>💡 关键数据</h3><div id="insights" style="font-size:12px;color:#555;line-height:1.8;padding:4px 8px"></div></div>
    </div>
  </div>

  <div id="view-stats" class="hidden">
    <div class="chart-box" style="margin-bottom:10px"><h3>📊 招标 vs 中标 业态对比</h3><canvas id="chCompare"></canvas></div>
    <div class="chart-box"><h3>📈 双轨月度趋势</h3><canvas id="chDualMonthly"></canvas></div>
  </div>

  <div class="toolbar" id="toolbar">
    <input type="text" id="searchInput" placeholder="🔍 搜索项目名称...">
    <select id="sectorFilter"><option value="">全部业态</option></select>
    <select id="typeFilter"><option value="">全部类型</option></select>
    <select id="monthFilter"><option value="">全部月份</option></select>
    <span style="font-size:12px;color:#888;margin-left:auto" id="resultCount"></span>
  </div>

  <div class="tb-wrap">
    <div class="tb-scroll" id="tbScroll">
      <table>
        <thead><tr>
          <th onclick="sortBy(1)" style="min-width:90px">发布日期 <span class="sort-ind" id="sort1">▼</span></th>
          <th onclick="sortBy(2)" style="min-width:130px">所属业态</th>
          <th onclick="sortBy(3)" style="min-width:110px">类型</th>
          <th onclick="sortBy(4)" style="min-width:200px">项目名称</th>
          <th onclick="sortBy(5)" style="min-width:220px">标段（包）名称</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pg"><span id="pageInfo"></span><div>
      <button id="prevBtn" onclick="changePage(-1)">上一页</button>
      <button id="nextBtn" onclick="changePage(1)">下一页</button>
    </div></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeDetail(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modalTitle">项目详情</h2>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <a id="modalLink" href="#" target="_blank">🔗 查看原始公告</a>
    </div>
  </div>
</div>

<div class="footer">数据来源：辽宁省招标投标监管网(lntb.gov.cn) · 2026.01-06 · 点击项目行查看详情</div>

var currentTab='tenders',currentPage=1,pageSize=30,sortCol=1,sortAsc=false;
var charts={},filtered=[],sectors=[],types=[],months=[];

function switchTab(tab){
  currentTab=tab;currentPage=1;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',
    t.textContent.indexOf(tab==='tenders'?'招标':tab==='bidders'?'中标':'统计')>-1)});
  document.getElementById('view-charts').classList.toggle('hidden',tab==='stats');
  document.getElementById('view-stats').classList.toggle('hidden',tab!=='stats');
  document.getElementById('toolbar').classList.toggle('hidden',tab==='stats');
  if(tab==='stats'){renderStatsView();return}
  loadTabData(tab);
}
function resetSort(){
  sortCol=1;sortAsc=false;
  document.querySelectorAll('.sort-ind').forEach(function(s){s.textContent=''});
  var el=document.getElementById('sort1');if(el)el.textContent='▼';
}
function loadTabData(tab){
  resetSort();
  var meta=D[tab];
  sectors=meta.sectors.map(function(s){return s.name});
  types=meta.types.map(function(t){return t.name});
  months=meta.monthly.map(function(m){return m.month});
  ['sectorFilter','typeFilter','monthFilter'].forEach(function(id){
    var sel=document.getElementById(id);
    var label=id==='sectorFilter'?'全部业态':id==='typeFilter'?'全部类型':'全部月份';
    var arr=id==='sectorFilter'?sectors:id==='typeFilter'?types:months;
    sel.innerHTML='<option value="">'+label+'</option>';
    arr.forEach(function(v){var o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o)});
  });
  var peak=meta.monthly.reduce(function(a,b){return a.count>b.count?a:b},{month:'',count:0});
  document.getElementById('kpi').innerHTML=[
    {l:'总公告数',v:meta.total+'条',s:'2026.01-06'},
    {l:'业态类别',v:meta.sectors.length+'类',s:'覆盖11大业态'},
    {l:'月度峰值',v:peak.month,v2:peak.count+'条',ac:true},
    {l:'日均发布',v:(meta.total/168).toFixed(0)+'条',s:meta.types.length+'种公告类型'},
  ].map(function(k){return'<div class="kpi'+(k.ac?' ac':'')+'"><div class="l">'+k.l+'</div><div class="v">'+k.v+(k.v2?'</div><div class="s">'+k.v2:'')+'</div><div class="s">'+(k.s||'')+'</div></div>'}).join('');
  updateCharts(meta);applyFilters();
}
function updateCharts(meta){
  var s=['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#6366f1','#f97316','#e11d48'];
  if(charts.monthly)charts.monthly.destroy();
  var ctx=document.getElementById('chMonthly');if(ctx)charts.monthly=new Chart(ctx,{type:'bar',data:{labels:meta.monthly.map(function(m){return m.month.substring(5)+'月'}),datasets:[{label:'数量',data:meta.monthly.map(function(m){return m.count}),backgroundColor:'#3b82f6',borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:100}}}}});
  if(charts.sector)charts.sector.destroy();
  var sc=meta.sectors.slice(0,11);
  charts.sector=new Chart(document.getElementById('chSector'),{type:'bar',data:{labels:sc.map(function(x){return x.name}),datasets:[{label:'数量',data:sc.map(function(x){return x.count}),backgroundColor:sc.map(function(_,i){return s[i]})}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}}}});
  if(charts.type)charts.type.destroy();
  var tp=meta.types.slice(0,15);
  charts.type=new Chart(document.getElementById('chType'),{type:'bar',data:{labels:tp.map(function(x){return x.name}),datasets:[{label:'数量',data:tp.map(function(x){return x.count}),backgroundColor:'#60a5fa'}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}}}});
  var ts=meta.sectors[0],tt=meta.types[0];
  document.getElementById('insights').innerHTML=[
    '📌 业态TOP1：<b>'+ts.name+'</b> ('+ts.count+'条, '+ts.pct+'%)',
    '📌 类型TOP1：<b>'+tt.name+'</b> ('+tt.count+'条, '+tt.pct+'%)',
    '📌 覆盖月份：<b>'+meta.monthly.length+'</b> 个月',
    '📌 公告类型：<b>'+meta.types.length+'</b> 种',
    '📌 日均发布：<b>'+(meta.total/168).toFixed(1)+'</b> 条',
  ].join('<br>');
}
function applyFilters(){
  var meta=D[currentTab];
  var recs=meta.records;
  var s=document.getElementById('searchInput').value.toLowerCase();
  var sf=document.getElementById('sectorFilter').value;
  var tf=document.getElementById('typeFilter').value;
  var mf=document.getElementById('monthFilter').value;
  filtered=recs.filter(function(r){
    if(s&&!(r[4]+r[5]).toLowerCase().indexOf(s)>-1)return false;
    if(sf&&r[2]!==sf)return false;
    if(tf&&r[3]!==tf)return false;
    if(mf&&!r[1].startsWith(mf))return false;
    return true;
  });
  sortData();currentPage=1;renderTable();
}
function sortData(){
  filtered.sort(function(a,b){
    var va=a[sortCol],vb=b[sortCol];
    if(sortCol===1){va=a[1];vb=b[1]}
    if(va<vb)return sortAsc?1:-1;
    if(va>vb)return sortAsc?-1:1;
    return 0;
  });
}
function sortBy(col){
  if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=(col===1?false:false)}
  document.querySelectorAll('.sort-ind').forEach(function(s){s.textContent=''});
  var el=document.getElementById('sort'+col);if(el)el.textContent=sortAsc?'▲':'▼';
  sortData();currentPage=1;renderTable();
}
function renderTable(){
  var start=(currentPage-1)*pageSize,pg=filtered.slice(start,start+pageSize);
  var meta=D[currentTab];
  var secCols={'城市更新 & 老旧改造':'#3b82f6','供排水及污水处理':'#10b981','市政道路 & 园区基建':'#f59e0b','房屋建筑（房建）':'#8b5cf6','生态环保 & 农林水利':'#06b6d4','电力 & 能源工程':'#ef4444','智能化 & 城市安全':'#ec4899','文旅 & 公服配套':'#84cc16','供热工程':'#e67e22','燃气工程':'#6366f1','其他工程':'#95a5a6'};
  document.getElementById('tbody').innerHTML=pg.map(function(r,idx){
    var url='https://www.lntb.gov.cn'+meta.detailUrl+r[0];
    var bg=secCols[r[2]]||'#eee';
    return'<tr onclick="openDetail(\''+r[0]+'\',\''+escapeHtml(r[1])+'\',\''+escapeHtml(r[2])+'\',\''+escapeHtml(r[3])+'\',\''+escapeHtml(r[4])+'\',\''+escapeHtml(r[5])+'\',\''+meta.detailUrl+'\')" title="点击查看详情"><td style="min-width:90px">'+r[1]+'</td><td style="min-width:130px"><span class="badge" style="background:'+bg+'">'+r[2]+'</span></td><td style="min-width:110px">'+r[3]+'</td><td style="min-width:200px">'+r[4]+'</td><td style="min-width:220px">'+r[5]+'</td></tr>';
  }).join('');
  var tp=Math.ceil(filtered.length/pageSize)||1;
  document.getElementById('pageInfo').textContent='共'+filtered.length+'条 · '+currentPage+'/'+tp+'页';
  document.getElementById('prevBtn').disabled=currentPage<=1;
  document.getElementById('nextBtn').disabled=currentPage>=tp;
  document.getElementById('resultCount').textContent='共'+filtered.length+'条';
  document.getElementById('tbScroll').scrollLeft=0;
}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function changePage(d){var tp=Math.ceil(filtered.length/pageSize);currentPage=Math.max(1,Math.min(tp,currentPage+d));renderTable();document.getElementById('tbScroll').scrollLeft=0}
function openDetail(id,date,sector,type,name,section,detailUrl){
  var url='https://www.lntb.gov.cn'+detailUrl+id;
  document.getElementById('modalTitle').textContent=type||'公告详情';
  document.getElementById('modalBody').innerHTML=
    '<div class="item"><div class="key">公告编号</div><div class="val">'+id+'</div></div>'+
    '<div class="item"><div class="key">发布日期</div><div class="val">'+date+'</div></div>'+
    '<div class="item"><div class="key">所属业态</div><div class="val">'+sector+'</div></div>'+
    '<div class="item"><div class="key">公告类型</div><div class="val">'+type+'</div></div>'+
    '<div class="item"><div class="key">项目名称</div><div class="val">'+name+'</div></div>'+
    '<div class="item"><div class="key">标段（包）名称</div><div class="val">'+section+'</div></div>'+
    '<div class="item"><div class="key">原始链接</div><div class="val link" style="word-break:break-all">'+url+'</div></div>';
  document.getElementById('modalLink').href=url;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeDetail(e){
  if(e&&e.target!==document.getElementById('modalOverlay'))return;
  document.getElementById('modalOverlay').classList.remove('show');
}
function renderStatsView(){
  var t=D.tenders,b=D.bidders;
  document.getElementById('kpi').innerHTML=[
    {l:'招标公告',v:t.total+'条'},
    {l:'中标结果',v:b.total+'条'},
    {l:'合计',v:(t.total+b.total)+'条',s:'日均'+(parseInt(t.total+b.total)/168).toFixed(0)+'条',ac:true},
    {l:'业态覆盖',v:t.sectors.length+'大类'},
  ].map(function(k){return'<div class="kpi'+(k.ac?' ac':'')+'"><div class="l">'+k.l+'</div><div class="v">'+k.v+'</div><div class="s">'+(k.s||'')+'</div></div>'}).join('');
  var allSecs=[];t.sectors.forEach(function(s){allSecs.push(s.name)});b.sectors.forEach(function(s){if(allSecs.indexOf(s.name)===-1)allSecs.push(s.name)});
  var tm={},bm={};
  t.sectors.forEach(function(s){tm[s.name]=s.count});
  b.sectors.forEach(function(s){bm[s.name]=s.count});
  var cd=allSecs.map(function(s){return{name:s,t:tm[s]||0,d:bm[s]||0}}).sort(function(a,b){return(b.t+b.d)-(a.t+a.d)});
  if(charts.compare)charts.compare.destroy();
  charts.compare=new Chart(document.getElementById('chCompare'),{type:'bar',data:{labels:cd.map(function(c){return c.name}),datasets:[{label:'招标公告',data:cd.map(function(c){return c.t}),backgroundColor:'#3b82f6',borderRadius:2},{label:'中标结果',data:cd.map(function(c){return c.d}),backgroundColor:'#f59e0b',borderRadius:2}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{position:'top'}}}});
  var am=[];t.monthly.forEach(function(m){am.push(m.month)});b.monthly.forEach(function(m){if(am.indexOf(m.month)===-1)am.push(m.month)});am.sort();
  var tmo={},bmo={};
  t.monthly.forEach(function(m){tmo[m.month]=m.count});
  b.monthly.forEach(function(m){bmo[m.month]=m.count});
  if(charts.dual)charts.dual.destroy();
  charts.dual=new Chart(document.getElementById('chDualMonthly'),{type:'line',data:{labels:am.map(function(m){return m.substring(5)+'月'}),datasets:[{label:'招标公告',data:am.map(function(m){return tmo[m]||0}),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',tension:.3,fill:true},{label:'中标结果',data:am.map(function(m){return bmo[m]||0}),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.1)',tension:.3,fill:true}]},options:{responsive:true,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true}}}});
}
['searchInput','sectorFilter','typeFilter','monthFilter'].forEach(function(id){
  var el=document.getElementById(id);if(!el)return;
  el.addEventListener('input',applyFilters);el.addEventListener('change',applyFilters);
});
loadTabData('tenders');
</script>
